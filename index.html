<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Goyavier</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ── VISTA: PORTAL DE INICIO ── -->
  <div id="view-portal">
    <div class="portal-bg"></div>
    <div class="portal-content">

      <div class="portal-header">
        <div class="portal-logo-circle">G</div>
        <h1 class="portal-title">Colegio Goyavier</h1>
        <p class="portal-subtitle">¿A qué sistema deseas ingresar?</p>
      </div>

      <div class="portal-cards">

        <a class="module-card" onclick="enterModule('Zaiko', 'https://zaikopro.netlify.app/')">
          <div class="module-card-icon" style="background:#565656">
            <i class="fa fa-boxes-stacked"></i>
          </div>
          <div class="module-card-body">
            <div class="module-card-title">Zaiko</div>
            <div class="module-card-desc">Gestión de inventario y activos institucionales</div>
          </div>
          <i class="fa fa-arrow-right module-card-arrow"></i>
        </a>

        <a class="module-card" onclick="enterModule('Paz y Salvo', 'https://pazysalvo.netlify.app/')">
          <div class="module-card-icon" style="background:#6A886A">
            <i class="fa fa-file-circle-check"></i>
          </div>
          <div class="module-card-body">
            <div class="module-card-title">Paz y Salvo</div>
            <div class="module-card-desc">Gestión de paz y salvos del personal</div>
          </div>
          <i class="fa fa-arrow-right module-card-arrow"></i>
        </a>

      </div>

      <div class="portal-footer">
        <i class="fa fa-shield-halved"></i>
        Cada sistema tiene su propio acceso independiente
      </div>

    </div>
  </div>

  <!-- ── VISTA: MÓDULO EN IFRAME ── -->
  <div id="view-module" class="hidden">
    <div class="module-topbar">
      <button class="back-btn" onclick="goPortal()">
        <i class="fa fa-chevron-left"></i> Portal
      </button>
      <span class="topbar-title" id="module-label"></span>
      <div></div>
    </div>
    <iframe id="module-frame" src="" allowfullscreen></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
