<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Goyavier</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ── VISTA: PORTAL DE INICIO ── -->
  <div id="view-portal" role="main">
    <div class="portal-bg" aria-hidden="true"></div>
    <div class="portal-content">

      <header class="portal-header">
        <div class="portal-logo-wrap">
          <img src="logo_goyavier.png" alt="Goyavier Colegio Campestre" class="portal-logo-img" />
        </div>
        <p class="portal-subtitle">¿A qué sistema deseas ingresar?</p>
      </header>

      <nav class="portal-cards" aria-label="Módulos del portal">

        <button class="module-card" onclick="window.open('https://colegiogoyavier.phidias.co/', '_blank', 'noopener,noreferrer')">
          <div class="module-card-icon" style="background:#1575bc" aria-hidden="true">
            <i class="fa fa-graduation-cap"></i>
          </div>
          <div class="module-card-body">
            <div class="module-card-title">Phidias Goyavier</div>
            <div class="module-card-desc">Plataforma académica y comunicación institucional</div>
          </div>
          <i class="fa fa-arrow-right module-card-arrow" aria-hidden="true"></i>
        </button>

        <button class="module-card" onclick="enterModule('Paz y Salvo', 'https://pazysalvo.netlify.app/')">
          <div class="module-card-icon" style="background:#5baee0" aria-hidden="true">
            <i class="fa fa-file-circle-check"></i>
          </div>
          <div class="module-card-body">
            <div class="module-card-title">Paz y Salvo</div>
            <div class="module-card-desc">Gestión de paz y salvos del personal</div>
          </div>
          <i class="fa fa-arrow-right module-card-arrow" aria-hidden="true"></i>
        </button>

      </nav>

      <footer class="portal-footer">
        <i class="fa fa-shield-halved" aria-hidden="true"></i>
        Cada sistema tiene su propio acceso independiente
      </footer>

    </div>
  </div>

  <!-- ── VISTA: MÓDULO EN IFRAME ── -->
  <div id="view-module" class="hidden" role="main" aria-label="Módulo activo">
    <div class="module-topbar">
      <button class="back-btn" onclick="goPortal()" aria-label="Volver al portal">
        <i class="fa fa-chevron-left" aria-hidden="true"></i> Portal
      </button>
      <span class="topbar-title" id="module-label"></span>
      <button class="newtab-btn" onclick="openNewTab()" title="Abrir en nueva pestaña" aria-label="Abrir en nueva pestaña">
        <i class="fa fa-arrow-up-right-from-square" aria-hidden="true"></i>
      </button>
    </div>

    <div class="module-loading hidden" id="module-loading" role="status" aria-label="Cargando módulo">
      <div class="loading-ring"></div>
      <span>Cargando módulo…</span>
    </div>

    <iframe id="module-frame" src="" allowfullscreen title="Módulo" onload="if(window.onFrameLoad)onFrameLoad()"></iframe>
  </div>

  <script src="app.js"></script>
</body>
</html>
